simulator_type: roborl
task_suite_name: roborl

auto_reset: ${algorithm.auto_reset}
ignore_terminations: ${algorithm.ignore_terminations}
max_episode_steps: ${algorithm.max_episode_steps}

# inter_sample: ${algorithm.inter_sample}
wm_action_interval: ${algorithm.wm_action_interval}
with_advantage_condition: ${algorithm.with_advantage_condition}


use_rel_reward: False
reward_coef: ${algorithm.reward_coef}
only_eval: False

seed: 0
num_group: ${algorithm.num_group_envs}
group_size: ${algorithm.group_size}
use_fixed_reset_state_ids: ${algorithm.use_fixed_reset_state_ids}
use_wrist_image: ${actor.model.use_wrist_image}

num_envs: ${multiply:${algorithm.group_size}, ${algorithm.num_group_envs}}

# Path to state data file
data_path: "data/debug_images_states.json"

policy_config_name: ${algorithm.policy_config_name}

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

init_params:
  camera_heights: 256
  camera_widths: 256

use_ordered_reset_state_ids: ${algorithm.use_ordered_reset_state_ids}

train_mode: ${actor.model.openpi.train_mode}
offline_rl: ${actor.model.openpi.offline_rl}
chunk_size: ${actor.model.num_action_chunks}